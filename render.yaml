services:
  - type: web
    name: jobletserver
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    
    envVars:
      - key: NODE_ENV
        value: production
    
    # Health check endpoint
    healthCheckPath: /api/debug-firebase-init
    
    # Auto-deploy on push
    autoDeploy: true

# Important: Add these environment variables in Render Dashboard:
# - FIREBASE_PROJECT_ID
# - FIREBASE_SERVICE_ACCOUNT_JSON
# - GEMINI_API_KEY
# - CLOUDINARY_NAME
# - CLOUDINARY_API_KEY
# - CLOUDINARY_API_SECRET
# - SUPABASE_URL
# - SUPABASE_KEY
# - FRONTEND_URL (http://localhost:5173,https://joblet-eight.vercel.app)

